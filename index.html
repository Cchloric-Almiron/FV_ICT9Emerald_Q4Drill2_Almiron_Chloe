<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
    
    body{
        background-image :url(' https://i.pinimg.com/1200x/73/ff/e6/73ffe6949f9b9fa1292822e7bd7c8833.jpg');
        background-size:cover;
        background-repeat:no-repeat;
    }

    #Main{
        background-color:rgba(255, 163, 34, 0.605);
        box-shadow:rgb(162, 0, 0);
        width:400px;
        height:400px;
        padding:30px;
        margin-top:50px;
        border-radius:50px;
        font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    }

    #temperature{
        width:380px;
        font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        border-radius:40px;
        padding:7px;
    }

    #humidity{
        width:380px;
        font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        border-radius:40px;
        padding:7px;
    }


    </style>

</head>
<body>

<center>
<div id="Main">
    <h1>Heat Index Checker</h1>

<details class="ontoggle">
  <summary>Instruction</summary>
  <p id="instruct"></p>
</details>
<br>

    <form>

    <label form="val1">Degree in Celsius</label>
    <br><br>
        <input type="number" id="temperature" class="form-control" placeholder="Input your degree value" required>
    
    <br><hr><br>

    <label form="val1">Humidity %</label>
    <br><br>
        <input type="number" id="humidity" class="form-control" placeholder="Input your percentage value" required>

    </form>
    <br>
    <button class="btn btn-danger" onclick="calc()" type="submit">Check</button> 
    <button type="button" onclick="window.location.reload()" class="btn btn-danger">Refresh</button>

    <script>

 document.getElementById('instruct').innerHTML="Input the temperature and humidity. Afterwards, click check to view your heat index."

        function calc(){

        let temperature, humidity, H, message      
        
        temperature = parseFloat(document.getElementById("temperature").value);
        humidity = parseFloat(document.getElementById("humidity").value);

        H = temperature + (0.33 * humidity) - 4;
 
         switch(true){
            case(H <= 27):
            message = "Comfortable/cool";
            break; 

            case(H >= 28 && H <= 32):
            message = "Warm";
            break; 

            case(H >= 33 && H <= 37):
            message = "Hot";
            break; 

            case(H >= 38 && H <= 41):
            message = "Very Hot/Caution";
            break;

            case(H >= 42):
            message = "Extreme Heat/Danger";
            break;

            default: 
            message = "Undetermined"; 

            }

            alert("Heat Index: " + H.toFixed(1) + "C°\n" + "Status: " + message);//concatenation
        }
        
    </script>
</div>
</center>

</body>
</html>
